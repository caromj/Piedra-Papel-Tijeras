<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Socket.IO chat</title>
    <style>
      body { margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

      #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
      #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
      #input:focus { outline: none; }
      #form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; }

      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages > li { padding: 0.5rem 1rem; }
      #messages > li:nth-child(odd) { background: #efefef; }
    </style>
  </head>
  <body>
    <ul id="messages"></ul> 
    <form id="form" action="">
      <input id="input" autocomplete="off" /><button>Send</button>
    </form>
    <script src="/socket.io/socket.io.js"></script> 
    <script>
      let counter = 0; // genera un contenedor unico por mensaje
  
      const socket = io({ // crea conexion con el servidor socket.io
        ackTimeout: 10000, // tiempo máx de espera con el servidor
        retries: 3, 
        auth: {
          serverOffset: 0 //se usa para saber hasta que mensaje se ha procesado ( útil para evitar duplicados)
        }
      });
  
      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');
  
      form.addEventListener('submit', (e) => { //escucha cuando el usuario envia el form
        e.preventDefault(); // evita que el formulario recarge la página
        if (input.value) {  // solo actua si hay texto
          const clientOffset = `${socket.id}-${counter++}`;  // crea un idenficador único para el mensaje 
          socket.emit('chat message', input.value, clientOffset); //el texto del mensaje //clientOffset para que el servidor lo reconozca
          input.value = ''; //limpia el campo de texto
        }
      });
  
      socket.on('chat message', (msg, serverOffset) => {  // escucha el chat mensaje que envia el servidor
        const item = document.createElement('li'); // crea un elemento de la lista
        item.textContent = msg; //pone el texto del mensaje dentro de la lista 
        messages.appendChild(item); // añade el mensaje a la lista del chat
        window.scrollTo(0, document.body.scrollHeight); // baja hasta el final para ver mensaje
        socket.auth.serverOffset = serverOffset;
      });
    </script>
  </body>
</html>
